<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta Piamonte - Panel en Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

     <nav class="bg-slate-800 text-white p-5 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
            <h1 class="text-xl font-black italic tracking-tighter text-blue-400">URBANIZACIÓN PIAMONTE</h1>
        </div>
        <button onclick="document.getElementById('modalLogin').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold py-2 px-4 rounded-lg shadow-lg transition">
            ACCESO RESIDENTES
        </button>
    </nav>

    <!-- Tablero Principal -->
    <div class="max-w-[95%] mx-auto p-6 md:p-10">
        <h2 class="text-xl font-black text-slate-700 mb-6 border-b-4 border-green-500 pb-2 uppercase">Planilla de Aportes</h2>
        
        <div id="tableroContainer" class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
            <iframe 
              src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQb77ZnTudh_yJv5FtsfB9UGwGFMkIZNZF4FPxAwKhGVHeHfcf2xnZne39yierwQst_mDlMRsjAiLjd/pubhtml" 
              style="width: 100%; height: 750px; border: none;" 
              loading="lazy">
            </iframe>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="modalLogin" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-200 p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-800 tracking-tighter italic">ACCESO PRIVADO</h3>
                <button onclick="document.getElementById('modalLogin').classList.add('hidden')" class="text-slate-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Usuario / Lote</label>
                    <input type="text" id="userLote" placeholder="Ej: admin" class="w-full p-3 rounded-xl bg-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Contraseña</label>
                    <input type="password" id="userPass" placeholder="Ej: 12345" class="w-full p-3 rounded-xl bg-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <button type="button" onclick="validarAcceso()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95">
                    Entrar al Panel
                </button>
            </form>
        </div>
    </div>

    <!-- Script de Validación -->
    <script>
    function validarAcceso() {
        const u = document.getElementById('userLote').value;
        const p = document.getElementById('userPass').value;

        if (u === "admin" && p === "12345") {
            alert("¡Acceso concedido!");
            document.getElementById('modalLogin').classList.add('hidden');
        } else {
            alert("Usuario o contraseña incorrectos.");
        }
    }
    </script>
</body>
</html>
