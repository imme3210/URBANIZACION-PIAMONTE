<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanización Piamonte - Dashboard</title>
    <!-- Usamos Tailwind CSS para que se vea profesional -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Encabezado (Header) -->
    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold italic tracking-wider">URBANIZACIÓN PIAMONTE</h1>
        </div>
        <!-- Este botón ahora tiene una función para abrir el modal -->
        <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-sm font-bold py-2 px-4 rounded transition">
            ACCESO RESIDENTES
        </button>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        
        <!-- Tarjetas de Resumen de Dinero -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 border-l-8 border-gray-400 shadow-md rounded-r-lg">
                <p class="text-gray-500 text-xs font-black uppercase">Saldo Disponible</p>
                <p class="text-3xl font-bold text-gray-800">$ 3.250.000</p>
            </div>
            <div class="bg-white p-6 border-l-8 border-blue-500 shadow-md rounded-r-lg">
                <p class="text-blue-500 text-xs font-black uppercase">Aportes del mes</p>
                <p class="text-3xl font-bold text-blue-600">$ 4.530.000</p>
            </div>
            <div class="bg-white p-6 border-l-8 border-red-500 shadow-md rounded-r-lg">
                <p class="text-red-500 text-xs font-black uppercase">Gastos del mes</p>
                <p class="text-3xl font-bold text-red-600">$ 1.330.000</p>
            </div>
        </div>

        <!-- Listas de Movimientos (Aportes y Gastos) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <!-- Columna de Ingresos -->
            <section>
                <div class="flex justify-between items-end mb-4 border-b-2 border-blue-500 pb-2">
                    <h2 class="text-xl font-extrabold text-gray-700">Aportes del mes</h2>
                    <span class="text-xs text-gray-400 font-bold uppercase">10 de 17</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <span><b class="block text-gray-700">Jose Antonio Garcia</b> <small class="text-gray-400">19/04/2024</small></span>
                        <span class="bg-green-100 text-green-700 font-black px-3 py-1 rounded">+$ 100.000</span>
                    </div>
                    <!-- Puedes copiar el bloque de arriba para agregar más nombres -->
                </div>
            </section>

            <!-- Columna de Gastos -->
            <section>
                <div class="flex justify-between items-end mb-4 border-b-2 border-red-500 pb-2">
                    <h2 class="text-xl font-extrabold text-red-700 text-right w-full">Gastos del mes</h2>
                    <span class="text-xs text-gray-400 font-bold uppercase ml-4">7 de 7</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <span class="bg-red-100 text-red-700 font-black px-3 py-1 rounded">-$ 15.000</span>
                        <span class="text-right"><b class="block text-gray-700">Pintura Garita</b> <small class="text-gray-400">18/04/2024</small></span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- VENTANA EMERGENTE (MODAL) DE LOGIN -->
    <div id="miModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl transform transition-all">
            <h2 class="text-2xl font-black text-gray-800 mb-2">Bienvenido</h2>
            <p class="text-gray-500 mb-6 text-sm">Ingresa tus credenciales para continuar.</p>
            
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Usuario</label>
            <input type="text" placeholder="Ej: admin123" class="w-full border-2 border-gray-100 p-3 mb-4 rounded-xl focus:border-blue-500 outline-none">
            
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Contraseña</label>
            <input type="password" placeholder="••••••••" class="w-full border-2 border-gray-100 p-3 mb-6 rounded-xl focus:border-blue-500 outline-none">
            
            <div class="flex flex-col gap-3">
                <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition">Entrar al panel</button>
                <button onclick="cerrarModal()" class="text-gray-400 text-sm font-bold hover:text-gray-600 transition">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Script para que el botón funcione -->
    <script>
        function abrirModal() {
            document.getElementById('miModal').classList.remove('hidden');
        }
        function cerrarModal() {
            document.getElementById('miModal').classList.add('hidden');
        }
    </script>
</body>
</html>
