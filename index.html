<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta Piamonte</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold italic">URBANIZACIÓN PIAMONTE</h1>
        <button onclick="document.getElementById('miModal').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold py-2 px-4 rounded">
            ACCESO RESIDENTES
        </button>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        <!-- Tus montos actualizados -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 border-l-8 border-gray-400 shadow-md rounded">
                <p class="text-gray-500 text-xs font-black uppercase">Saldo Disponible</p>
                <p class="text-3xl font-bold text-gray-800">$ 2.050.000</p>
            </div>
            <div class="bg-white p-6 border-l-8 border-blue-500 shadow-md rounded">
                <p class="text-blue-500 text-xs font-black uppercase">Aportes del mes</p>
                <p class="text-3xl font-bold text-blue-600">$ 1.530.000</p>
            </div>
            <div class="bg-white p-6 border-l-8 border-red-500 shadow-md rounded">
                <p class="text-red-500 text-xs font-black uppercase">Gastos del mes</p>
                <p class="text-3xl font-bold text-red-600">$ 4.225.000</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Aportes -->
            <section>
                <h2 class="text-xl font-extrabold text-gray-700 mb-4 border-b-2 border-blue-500">Aportes del mes</h2>
                <div class="bg-white p-4 rounded-lg shadow-sm flex justify-between">
                    <span><b class="block">Junta de Acción Comunal Piamonte</b><small class="text-gray-400">19/04/2024</small></span>
                    <span class="text-green-700 font-bold">+$ 100.000</span>
                </div>
            </section>

            <!-- Gastos -->
            <section>
                <h2 class="text-xl font-extrabold text-red-700 mb-4 border-b-2 border-red-500 text-right">Gastos del mes</h2>
                <div class="bg-white p-4 rounded-lg shadow-sm flex justify-between">
                    <span class="text-red-700 font-bold">-$ 15.000</span>
                    <span class="text-right"><b class="block">Pago de Conserjes</b><small class="text-gray-400">18/04/2024</small></span>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal de Login -->
    <div id="miModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-4">Bienvenido</h2>
            <input type="text" placeholder="Usuario" class="w-full border p-3 mb-3 rounded">
            <input type="password" placeholder="Contraseña" class="w-full border p-3 mb-6 rounded">
            <button onclick="document.getElementById('miModal').classList.add('hidden')" class="w-full bg-blue-600 text-white font-bold py-3 rounded">Entrar</button>
        </div>
    </div>

</body>
</html>
