<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta Piamonte - Panel en Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <nav class="bg-slate-800 text-white p-5 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
            <h1 class="text-xl font-black italic tracking-tighter text-blue-400">URBANIZACIÓN PIAMONTE</h1>
        </div>
        <button onclick="document.getElementById('modalLogin').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold py-2 px-4 rounded-lg shadow-lg transition">
            ACCESO RESIDENTES
        </button>
    </nav>

    <div class="max-w-6xl mx-auto p-6 md:p-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 border-l-8 border-slate-400 shadow-lg rounded-xl">
                <p class="text-slate-500 text-xs font-black uppercase mb-1">Saldo Disponible</p>
                <p id="saldo-total" class="text-3xl font-black text-slate-800">$ 0</p>
            </div>
            <div class="bg-white p-6 border-l-8 border-blue-500 shadow-lg rounded-xl">
                <p class="text-blue-600 text-xs font-black uppercase mb-1">Total Aportes</p>
                <p id="total-aportes" class="text-3xl font-black text-blue-600">$ 0</p>
            </div>
            <div class="bg-white p-6 border-l-8 border-red-500 shadow-lg rounded-xl">
                <p class="text-red-600 text-xs font-black uppercase mb-1">Total Gastos</p>
                <p id="total-gastos" class="text-3xl font-black text-red-600">$ 0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <section>
                <h2 class="text-xl font-black text-slate-700 mb-6 border-b-4 border-blue-500 pb-2">Aportes del mes</h2>
                <div id="lista-aportes" class="space-y-4">
                    <p class="text-slate-400 italic">Cargando aportes...</p>
                </div>
            </section>
            <section>
                <h2 class="text-xl font-black text-red-700 mb-6 border-b-4 border-red-500 pb-2 text-right">Gastos del mes</h2>
                <div id="lista-gastos" class="space-y-4">
                    <p class="text-slate-400 italic text-right">Cargando gastos...</p>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal Login -->
  <div class="max-w-6xl mx-auto p-6 md:p-10">
    <h2 class="text-xl font-black text-slate-700 mb-6 border-b-4 border-green-500 pb-2">Planilla de Aportes</h2>
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <!-- Se eliminó el atributo sandbox restrictivo para evitar el conflicto de scripts -->
        <iframe 
            src="https://google.com" 
            style="width: 100%; height: 700px; border: none;"
            loading="lazy">
        </iframe>
    </div>
</div>
