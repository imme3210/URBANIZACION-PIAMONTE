<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta Piamonte - Panel en Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <nav class="bg-slate-800 text-white p-5 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
            <h1 class="text-xl font-black italic tracking-tighter text-blue-400">URBANIZACIÓN PIAMONTE</h1>
        </div>
        <button onclick="document.getElementById('modalLogin').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold py-2 px-4 rounded-lg shadow-lg transition">
            ACCESO RESIDENTES
        </button>
    </nav>

    <!-- Modal Login -->
  <div class="max-w-6xl mx-auto p-6 md:p-10">
        <h2 class="text-xl font-black text-slate-700 mb-6 border-b-4 border-green-500 pb-2">TABLERO DE CONTROL</h2>
        <div class="bg-white rounded-none shadow-2xl overflow-hidden border border-slate-200">
          
            <iframe 
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQb77ZnTudh_yJv5FtsfB9UGwGFMkIZNZF4FPxAwKhGVHeHfcf2xnZne39yierwQst_mDlMRsjAiLjd/pubhtml" 
                style="width: 100%; height: 600px; border: none;"
                loading="lazy">
            </iframe>
        </div>
    <div id="modalLogin" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-none shadow-2xl w-full max-w-md overflow-hidden border border-slate-200 transform transition-all">
        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-800 tracking-tighter italic">ACCESO PRIVADO</h3>
                <button onclick="document.getElementById('modalLogin').classList.add('hidden')" class="text-slate-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Identificación / Lote</label>
                    <input type="text" class="w-full p-3 rounded-xl bg-slate-100 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Contraseña</label>
                    <input type="password" class="w-full p-3 rounded-xl bg-slate-100 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button type="button" onclick="alert('Sistema en mantenimiento')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all transform active:scale-95">
                    Entrar al Panel
                </button>
            </form>
        </div>
    </div>
</div>
     <footer class="mt-10 pb-10 text-center text-slate-500 text-sm">
    <p>© 2025 Urbanización Piamonte - Administración</p>
    <p>¿Dudas con tus pagos? <a href="https://wa.me" class="text-blue-500 font-bold hover:underline">Escríbenos por WhatsApp</a>3015923840</p>
</footer> 
</body>
</html
